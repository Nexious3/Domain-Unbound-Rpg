<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu Incremental</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header id="hud">
            <div class="stat-box">Grade: <span id="hud-grade">4th Grade</span></div>
            <div class="stat-box">Cursed Energy: <span id="hud-ce">0</span></div>
            <div class="stat-box">Sorcerer Level: <span id="hud-level">1</span></div>
        </header>

        <div id="main-layout">
            <nav id="sidebar">
                <button class="nav-btn" data-target="training-panel">Training</button>
                <button class="nav-btn" data-target="combat-panel">Missions</button>
                <button class="nav-btn" data-target="domain-panel">Domain Tuning</button>
            </nav>

            <main id="viewport">
                <section id="training-panel" class="panel">
                    <h2>Physical & Spiritual Discipline</h2>
                    <div class="card-grid" id="training-list">
                        </div>
                </section>

                <section id="combat-panel" class="panel">
                    <h2>Cursed Spirit Extermination</h2>
                    <div id="combat-screen">
                        <div id="combat-log"></div>
                        <div id="combat-actions">
                            <button class="combat-btn" id="btn-attack" disabled>Basic Attack</button>
                            <button class="combat-btn" id="btn-technique" disabled>Cursed Technique</button>
                            <button id="domain-expansion-btn" class="domain-btn" disabled>DOMAIN EXPANSION</button>
                        </div>
                    </div>
                </section>

                <section id="domain-panel" class="panel">
                    <h2>Innate Techniques & Domains</h2>
                    <div class="card-grid" id="abilities-list">
                        </div>
                </section>
            </main>
        </div>
    </div>

    <div id="domain-overlay" class="hidden">
        <h1 class="domain-title">DOMAIN EXPANSION</h1>
    </div>

    <script src="state.js"></script>
    <script src="training.js"></script>
    <script src="combat.js"></script>
    <script src="abilities.js"></script>
    <script src="assets.js"></script>
    <script src="app.js"></script>
</body>
</html>
