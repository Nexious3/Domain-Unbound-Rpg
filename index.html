<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player 6 - The Weaver UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hud-header">
        <div class="hud-status">Status: <span id="hud-status-text">Idle</span></div>
        <div class="hud-score">Score: <span id="hud-score-text">0</span></div>
    </header>

    <nav class="tab-navigation">
        <button class="tab-btn active" data-target="panel-main">Main</button>
        <button class="tab-btn" data-target="panel-data">Data Structures</button>
        <button class="tab-btn" data-target="panel-logs">Combat Log</button>
    </nav>

    <main class="panel-container">
        
        <section id="panel-main" class="tab-panel active">
            <h2>Actions</h2>
            <div class="button-group">
                <button id="btn-action-1" class="action-btn">Trigger Action 1</button>
                <button id="btn-action-2" class="action-btn">Trigger Action 2</button>
            </div>
        </section>

        <section id="panel-data" class="tab-panel">
            <h2>Dynamic Lists</h2>
            <button id="btn-render-list" class="action-btn">Refresh Data List</button>
            <ul id="dynamic-list">
                </ul>
        </section>

        <section id="panel-logs" class="tab-panel">
            <h2>Combat Log</h2>
            <div id="combat-log-container" class="log-container">
                </div>
        </section>

    </main>

    <script type="module" src="app.js"></script>
    </body>
    
    <!-- Player 6 will build the visual layout interface here -->

    <!-- THE JUJUTSU ENGINE MATRIX (Loaded in mathematical dependency order) -->
    <script src="state.js"></script>
    <script src="assets.js"></script>
    <script src="training.js"></script>
    <script src="abilities.js"></script>
    <script src="combat.js"></script>
    <script src="app.js"></script>
</body>
</html>
